<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>Náběr — Reality Dufek &amp; Partneři</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#26211a;font-family:-apple-system,'Segoe UI',Arial,sans-serif;min-height:100vh}
.bar{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:12px;padding:10px 16px;background:#211c15;color:#faf8f4;box-shadow:0 2px 12px rgba(0,0,0,.4)}
.bar b{font-size:14px;letter-spacing:.3px}
.bar .sub{font-size:10.5px;color:#c2ab7d}
.bar .dl{margin-left:auto;background:#918361;color:#211c15;font-weight:800;font-size:12.5px;padding:8px 15px;border-radius:9px;text-decoration:none;white-space:nowrap}
.bar .dl:hover{background:#a99a74}
#pages{max-width:920px;margin:0 auto;padding:14px 10px 60px}
.pg{position:relative;margin:0 0 14px;box-shadow:0 8px 30px rgba(0,0,0,.45);border-radius:4px;overflow:hidden;background:#faf8f4}
.pg canvas{width:100%;display:block}
.pg a.lnk{position:absolute;display:block;border-radius:4px}
.pg a.lnk:hover{outline:2px solid rgba(145,131,97,.9);background:rgba(145,131,97,.14);cursor:pointer}
#msg{color:#c2ab7d;text-align:center;padding:60px 20px;font-size:14px}
</style>
</head>
<body>
<div class="bar"><div><b>REALITY DUFEK &amp; PARTNEŘI</b><div class="sub">Karel Dufek · realitní makléř · realitydufek.cz</div></div><a class="dl" id="dl" download>⬇ Stáhnout PDF</a></div>
<div id="msg">Načítám náběr…</div>
<div id="pages"></div>
<script src="lib/pdf.min.js"></script>
<script>
(function(){
  var f=(new URLSearchParams(location.search).get('f')||'').replace(/[^a-z0-9-]/g,'');
  if(!f){document.getElementById('msg').textContent='Chybí parametr souboru.';return;}
  var url='pdfs/'+f+'.pdf';
  var dl=document.getElementById('dl');dl.href=url;dl.setAttribute('download','Nabor_'+f+'.pdf');
  document.title='Náběr '+f+' — Reality Dufek';
  pdfjsLib.GlobalWorkerOptions.workerSrc='lib/pdf.worker.min.js';
  pdfjsLib.getDocument(url).promise.then(async function(doc){
    document.getElementById('msg').style.display='none';
    var cont=document.getElementById('pages');
    for(var i=1;i<=doc.numPages;i++){
      var page=await doc.getPage(i);
      var scale=Math.min(2, 1800/page.getViewport({scale:1}).width);
      var vp=page.getViewport({scale:scale});
      var wrap=document.createElement('div');wrap.className='pg';
      var c=document.createElement('canvas');c.width=vp.width;c.height=vp.height;
      wrap.appendChild(c);cont.appendChild(wrap);
      await page.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;
      var annots=await page.getAnnotations();
      annots.forEach(function(a){
        if(a.subtype!=='Link'||!a.url)return;
        var r=vp.convertToViewportRectangle(a.rect);
        var x=Math.min(r[0],r[2]),y=Math.min(r[1],r[3]),w=Math.abs(r[2]-r[0]),h=Math.abs(r[3]-r[1]);
        var el=document.createElement('a');
        el.className='lnk';el.href=a.url;el.target='_blank';el.rel='noopener';el.title=a.url;
        el.style.left=(x/vp.width*100)+'%';el.style.top=(y/vp.height*100)+'%';
        el.style.width=(w/vp.width*100)+'%';el.style.height=(h/vp.height*100)+'%';
        wrap.appendChild(el);
      });
    }
  }).catch(function(e){document.getElementById('msg').textContent='Náběr se nepodařilo načíst ('+e.message+').';});
})();
</script>
</body>
</html>
